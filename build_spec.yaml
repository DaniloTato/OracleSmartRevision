version: 0.1
component: build
timeoutInSeconds: 1200
shell: bash

env:
  variables:
    IMAGE_NAME: oracle-smart-frontend
    OCIR_REGION: qro.ocir.io
    OCIR_NAMESPACE: axozuy0c3gbd
    OCIR_USERNAME: axozuy0c3gbd/a01645849@tec.mx
    FRONTEND_RUNTIME_BASE: qro.ocir.io/axozuy0c3gbd/oracle-smart-frontend:a2c76df

  vaultVariables:
    OCIR_AUTH_TOKEN: ocid1.vaultsecret.oc1.mx-queretaro-1.amaaaaaa7v5mmhaaf7q2urefhhriu4aezmyxyk4hm3peqlvlpnph6fwa4afa

steps:
  - type: Command
    name: "Install dependencies and build frontend"
    command: |
      npm ci
      npm run build

  - type: Command
    name: "Login to OCIR"
    command: |
      echo "${OCIR_AUTH_TOKEN}" | podman login ${OCIR_REGION} -u "${OCIR_USERNAME}" --password-stdin

  - type: Command
    name: "Build frontend image from OCIR runtime base"
    command: |
      IMAGE_TAG=$(git rev-parse --short HEAD)

      cat > Dockerfile.ci <<DOCKERFILE
      FROM ${FRONTEND_RUNTIME_BASE}
      RUN rm -rf /usr/share/nginx/html/*
      COPY dist /usr/share/nginx/html
      EXPOSE 80
      CMD ["nginx", "-g", "daemon off;"]
      DOCKERFILE

      podman build -f Dockerfile.ci -t ${OCIR_REGION}/${OCIR_NAMESPACE}/${IMAGE_NAME}:${IMAGE_TAG} .

  - type: Command
    name: "Push Docker image to OCIR"
    command: |
      IMAGE_TAG=$(git rev-parse --short HEAD)
      podman push ${OCIR_REGION}/${OCIR_NAMESPACE}/${IMAGE_NAME}:${IMAGE_TAG}

  - type: Command
    name: "Prepare rolling Kubernetes manifest"
    command: |
      IMAGE_TAG=$(git rev-parse --short HEAD)
      sed "s|qro.ocir.io/axozuy0c3gbd/oracle-smart-frontend:v1|${OCIR_REGION}/${OCIR_NAMESPACE}/${IMAGE_NAME}:${IMAGE_TAG}|g" frontend-rolling.yaml > frontend-rolling.generated.yaml

outputArtifacts:
  - name: frontend_rolling_manifest
    type: BINARY
    location: frontend-rolling.generated.yaml
