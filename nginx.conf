server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA / React Router — all non-file routes fall back to index.html
    location / {
        try_files $uri /index.html;
    }

    # Long-lived cache for fingerprinted static assets (Vite hashed filenames)
    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Do not cache the shell — ensures blue/green rollouts pick up new bundles
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Kubernetes readiness/liveness probes
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

